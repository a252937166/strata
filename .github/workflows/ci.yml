name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/package-lock.json
      - name: install
        working-directory: agent
        run: npm ci
      - name: typecheck
        working-directory: agent
        run: npm run typecheck
      - name: golden tests (schema + evidence grounding, no LLM key needed)
        working-directory: agent
        run: npm test
      - name: bundle (node16 target)
        working-directory: agent
        run: npm run bundle

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        working-directory: web
        run: npm ci
      - name: build (includes tsc)
        working-directory: web
        run: npm run build
